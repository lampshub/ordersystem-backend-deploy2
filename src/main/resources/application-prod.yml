server:
  port: 8080  #디폴트값

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://xxxxxxxxx:3306/ordersystem?useSSL=true
    username: xxxxxxxxx
    password: xxxxxxxxx
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto: create
    show_sql: true
  servlet:
    multipart:
      max-file-size: 1000MB
      max-request-size: 1000MB
  redis:
    host: xxxxxxxxx
    port: 6379

jwt:
  expiration: 30   #유효시간 30분. 자유롭게 설정 가능.
  #  인코딩된 문자 32자 이상 필요.(특수문자) : base64 encoder 웹사이트 활용
  #  beyondaccesstokensecretkeybeyondaccesstokensecretkeybeyondaccesstokensecretkey
  secretKey: YmV5b25kYWNjZXNzdG9rZW5zZWNyZXRrZXliZXlvbmRhY2Nlc3N0b2tlbnNlY3JldGtleWJleW9uZGFjY2Vzc3Rva2Vuc2VjcmV0a2V5
  expirationRt: 30000
  secretKeyRt: YmV5b25kYWNjZXNzdG9rZW5zZWNyZXRrZXliZXlvbmRhY2Nlc3N0b2tlbnNlY3JldGtleWJleW9uZGFjY2Vzc3Rva2Vuc2VjcmV0a2V5

#  logback의 로그레벨 : trace < debug < info < error 순서
logging:
  level:
    root: info

#aws s3 접근하기위한 계정세팅
aws:
  credentials:    #유출되면 안됨!!!
    access-key: xxxxxxxxx
    secret-key: xxxxxxxxx
  region: ap-northeast-2  #aws전세계 센터위치(아시아태평양(서울))
  s3:
    bucket1: lamps-board-profile-image    #용도에 따라 다른버킷을 사용할때 bucket2 같은 식으로 추가해서 사용할수도 있음
